<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Message 💖</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:"Comic Sans MS", cursive;
  background: linear-gradient(135deg,#ffd6e0,#e0f7ff);
  overflow:hidden;
}

/* BACKGROUND DECOR */
.bg{
  position:fixed;
  width:100%;
  height:100%;
  background:
    radial-gradient(circle,#ffb6c1 10%,transparent 10%),
    radial-gradient(circle,#ffd6e0 10%,transparent 10%);
  background-size:60px 60px;
  opacity:0.25;
  z-index:0;
}

/* TABLE CARD */
.table{
  position:relative;
  z-index:2;
  width:420px;
  max-width:90%;
  background:white;
  border-radius:20px;
  padding:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.15);
  text-align:center;
}

/* TITLE */
h1{
  color:#ff4d88;
  font-size:20px;
}

/* MESSAGE BOX */
.messageBox{
  margin-top:15px;
  padding:15px;
  border-radius:15px;
  background:#fff0f5;
  border:2px dashed #ffb6c1;

  height:300px;
  max-height:60vh;
  overflow-y:auto;

  font-size:16px;
  color:#ff4d88;
  text-align:left;
  line-height:1.6;

  white-space:pre-wrap;
  word-wrap:break-word;
}

/* SCROLLBAR */
.messageBox::-webkit-scrollbar{
  width:6px;
}

.messageBox::-webkit-scrollbar-thumb{
  background:#ff4d88;
  border-radius:10px;
}

/* CURSOR */
.cursor{
  display:inline-block;
  width:10px;
  height:18px;
  background:#ff4d88;
  margin-left:2px;
  animation:blink 0.7s infinite;
}

@keyframes blink{
  50%{opacity:0;}
}

/* HEARTS */
.heart{
  position:absolute;
  font-size:20px;
  animation:floatUp 4s linear forwards;
}

@keyframes floatUp{
  0%{transform:translateY(0);opacity:1;}
  100%{transform:translateY(-600px);opacity:0;}
}

/* MOBILE */
@media (max-width:600px){
  .table{
    width:90%;
  }

  .messageBox{
    font-size:15px;
    height:250px;
  }
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="table">
  <h1>💌 A Message For You 💖</h1>

  <div class="messageBox" id="text"></div>
  <span class="cursor"></span>
</div>

<script>

/* 💖 YOUR MESSAGE (UNCHANGED) */
const message =
"Hey babyyyy 💖\n\n" +
"I just wanted to say that you are the most beautifull girll and thgeeee PERFECTTTT GIRLL IN THE WHOLEEE WORLDDDD NOBODYUYYY IS MORE PERFECTT THANN YOUUU ANIII YOUU AREE SOOO CUTEE KKKKK HOWWW ARE YOUUUU SOOOO CUTEEEE KKK MYYY LOVEEEEEEE HEHEHHEHE.\n" +
"YOU MAKEEEEE EMEEE FEELLL SOOO SPEEECIALALLAL ANNIII IMM VERY GREATFULL TO HAVE YOU IN MYYY LIFEEEEEE, EVEN WHEN I FUCKK THINGSSS UPPP I STILLL LOVEEE YOUUU SMMMMMM\n\n" +
"IMMM FEELINGNGN CVERYYYYY LUCKKYYY TOOO CALL YOUU MIUNEE BABBYY YOU MEAN EVERYY THINGG TOOO MEE LIKEE EVERYTHINGNGNGN ANIII I MADEEE THISS ALLL FORRR YOUUUUU IT REALLYY TOOKK MEE SOOOOOO MUCHCHCHH TIMEEE TARAAA IDCCC EVERYYYY SECONDDDD AND EVERY MILLISECOND IS WORTHHHH SPENDINGGG IFF THEE TOPIC ISS FOR YOUUUUU, KASSAM YOUUU MEANNN SOOOO MUCHHH TO MEE KKKKK💕\n" +
"IKK THEREEE ISSS UPSS AND DOWNSSS IN A REALTIONSHIPP BUT I PROMISEE TOO STAYYY BY YOURRR SIDEE IN EVRRYRYYRY FREAKINGGG SITUATIONNNNNNN, SOMETIMESSSMSMMS II GOO ALIII MADDD SORRYYY FOR THATT TARAAA YOUUUUU MEANNN SOOO MUCHHH TOOO MEE KKKK II CANN NEVER LOOSEE YOUUU I CANN NEVER LOOSE THISSS PRETTTYY LITTLEEE ANGELLLLL BABYYYYYYY NEVERRR KKK NECVERRRRRRR 😊💖\n\n" +
"I HOPEEE THATTT YOUU NEVERRR GETT TIREDD OFFF MEEE ANDD NEVERRR STOIPPP LOVINNGGGGF MEEE, TRARA J VAYENNIIIII MY LOVEE ISSS NEVER FADINGNGNG FORRR YOUUUU EVENNN WHENN WE DONT TALKKK FOR YEARSSS OR EVENNNN ANYUTHINGGG GOESSS WRONGGG II WILLL BE BY YOUR SIDE FORRR EVERRRRR EHEHEHE I LOVE YOUUUU SMMMMMMMMMMMMMMMMMMMMMMMMMMMMMMMMMM 💖💖💖        YOUR BOY,PRANIT";

let i = 0;
const speed = 40;

function typeWriter(){
  if(i < message.length){

    const box = document.getElementById("text");

    box.innerHTML += message.charAt(i);
    i++;

    // 💖 smooth auto-scroll
    box.scrollTop = box.scrollHeight;

    setTimeout(typeWriter, speed);
  }
}

/* 💖 FIX: ensures it always starts properly */
window.onload = typeWriter;

/* 💖 floating hearts */
setInterval(() => {
  const h = document.createElement("div");
  h.className = "heart";
  h.innerHTML = "💖";
  h.style.left = Math.random()*100 + "vw";
  h.style.top = "100vh";
  document.body.appendChild(h);

  setTimeout(() => h.remove(), 4000);
}, 300);

</script>

</body>
</html>
